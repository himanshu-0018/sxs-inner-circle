<!-- public/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SxS Inner Circle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>
    <nav class="navbar">
        <a href="/" class="logo"><span>👑</span> SxS Inner Circle</a>
        <div class="nav-links">
            <a href="login.html" class="btn-nav-primary">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to access your mentorship</p>
            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
