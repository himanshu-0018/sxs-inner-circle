<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch - SxS Inner Circle</title>
    <link rel="stylesheet" href="css/style.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body class="no-select" oncontextmenu="return false">
    <div class="bg-animation"></div>

    <nav class="navbar">
        <a href="/dashboard.html" class="logo"><span>👑</span> SxS</a>
        <div class="nav-links">
            <a href="/dashboard.html">← Back</a>
            <button onclick="logout()" class="btn-nav-primary">Logout</button>
        </div>
    </nav>

    <div class="player-container">
        <button class="back-btn" onclick="history.back()">← Back to lectures</button>

        <div class="video-player-wrapper" id="playerWrapper">
            <!-- Loading -->
            <div class="player-loading" id="playerLoading">
                <div class="spinner"></div>
                <p style="color:#fff;margin-top:12px;font-size:0.9rem;">Loading...</p>
            </div>

            <!-- Video iframe -->
            <iframe id="videoFrame"
                style="display:none;width:100%;height:100%;border:none;position:absolute;top:0;left:0;"
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"
                oncontextmenu="return false">
            </iframe>

            <!-- Fullscreen button -->
            <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>

            <!-- Block Google Drive buttons -->
            <div style="position:absolute;top:0;right:0;width:140px;height:55px;z-index:20;background:transparent;"></div>
            <div style="position:absolute;bottom:0;right:0;width:70px;height:50px;z-index:20;background:transparent;"></div>
        </div>

        <div class="video-info-panel">
            <h3 id="videoTitle">Loading...</h3>
            <p id="videoDescription"></p>
            <div class="video-info-meta">
                <span id="videoMentorship"></span>
                <span id="videoViews"></span>
                <span id="videoDate"></span>
            </div>
        </div>

        <div class="warning-banner">
            ⚠️ This video is watermarked with your identity
            (<span id="wmPreview"></span>). Unauthorized sharing = permanent ban.
        </div>
    </div>

    <script src="js/watch.js"></script>
</body>
</html>
