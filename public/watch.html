<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch - SxS Inner Circle</title>
    <link rel="stylesheet" href="css/style.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body class="no-select" oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="bg-animation"></div>

    <nav class="navbar">
        <a href="/dashboard.html" class="logo"><span>👑</span> SxS</a>
        <div class="nav-links">
            <a href="/dashboard.html">← Back</a>
            <button onclick="logout()" class="btn-nav-primary">Logout</button>
        </div>
    </nav>

    <div class="player-container">
        <button class="back-btn" onclick="history.back()">← Back to lectures</button>

        <!-- VIDEO PLAYER WRAPPER -->
        <div class="video-player-wrapper" id="playerWrapper">

            <!-- Loading Screen -->
            <div class="player-loading" id="playerLoading">
                <div class="spinner"></div>
                <p style="color:#fff;margin-top:12px;font-size:0.9rem;">Loading secure stream...</p>
            </div>

            <!-- Google Drive iframe player -->
            <iframe
                id="videoFrame"
                style="display:none;width:100%;height:100%;border:none;position:absolute;top:0;left:0;"
                allowfullscreen="true"
                allow="autoplay; encrypted-media; fullscreen"
                sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"
                oncontextmenu="return false">
            </iframe>

            <!-- WATERMARK LAYERS -->
            <div class="watermark-layer" id="wmLayer1"></div>
            <div class="watermark-layer" id="wmLayer2">
                <div class="wm-grid-layer" id="wmGrid"></div>
            </div>
            <div class="wm-center" id="wmCenter"></div>
            <div class="wm-corner tl" id="wmTL"></div>
            <div class="wm-corner tr" id="wmTR"></div>
            <div class="wm-corner bl" id="wmBL"></div>
            <div class="wm-corner br" id="wmBR"></div>

                        <!-- Fullscreen Button -->
            <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>

          

            <!-- Shield overlay to prevent right click on iframe -->
            <div class="iframe-shield" id="iframeShield"></div>
        </div>

        <div class="video-info-panel">
            <h3 id="videoTitle">Loading...</h3>
            <p id="videoDescription"></p>
            <div class="video-info-meta">
                <span id="videoMentorship"></span>
                <span id="videoViews"></span>
                <span id="videoDate"></span>
            </div>
        </div>

        <div class="warning-banner">
            ⚠️ This video is protected with 6-layer dynamic watermarking tied to your identity
            (<span id="wmPreview"></span>). Unauthorized sharing = permanent ban + legal action.
        </div>
    </div>

    <script src="js/watch.js"></script>
</body>
</html>
