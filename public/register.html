<!-- public/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - SxS Inner Circle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>
    <nav class="navbar">
        <a href="/" class="logo"><span>👑</span> SxS Inner Circle</a>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="register.html" class="btn-nav-primary">Register</a>
        </div>
    </nav>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Join SxS Inner Circle</h2>
            <p class="subtitle">Enter your access key to create account</p>
            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>🔑 Access Key (Given by Admin)</label>
                    <input type="text" id="accessKey" placeholder="SXS-XXXX-XXXX-XXXX" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
